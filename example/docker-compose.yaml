services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb --ignore-existing local/${MINIO_BUCKET:-otel-data} &&
      exit 0
      "

  lakekeeper-db:
    image: postgres:17
    environment:
      POSTGRES_PASSWORD: postgres
    volumes:
      - lakekeeper-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 5

  lakekeeper-migrate:
    image: quay.io/lakekeeper/catalog:latest-main
    environment:
      LAKEKEEPER__PG_ENCRYPTION_KEY: ${LAKEKEEPER_ENCRYPTION_KEY:-this-is-NOT-secure}
      LAKEKEEPER__PG_DATABASE_URL_READ: postgresql://postgres:postgres@lakekeeper-db:5432/postgres
      LAKEKEEPER__PG_DATABASE_URL_WRITE: postgresql://postgres:postgres@lakekeeper-db:5432/postgres
    command: ["migrate"]
    restart: "no"
    depends_on:
      lakekeeper-db:
        condition: service_healthy

  lakekeeper:
    image: quay.io/lakekeeper/catalog:latest-main
    environment:
      LAKEKEEPER__PG_ENCRYPTION_KEY: ${LAKEKEEPER_ENCRYPTION_KEY:-this-is-NOT-secure}
      LAKEKEEPER__PG_DATABASE_URL_READ: postgresql://postgres:postgres@lakekeeper-db:5432/postgres
      LAKEKEEPER__PG_DATABASE_URL_WRITE: postgresql://postgres:postgres@lakekeeper-db:5432/postgres
    command: ["serve"]
    ports:
      - "8181:8181"
    healthcheck:
      test: ["CMD", "/home/nonroot/lakekeeper", "healthcheck"]
      interval: 2s
      timeout: 5s
      retries: 5
      start_period: 3s
    depends_on:
      lakekeeper-migrate:
        condition: service_completed_successfully
      minio:
        condition: service_healthy

  lakekeeper-bootstrap:
    image: curlimages/curl
    entrypoint: /bin/sh
    command:
      - "-c"
      - >-
        CODE=$$(curl -s -o /dev/null -w '%{http_code}' -X POST
        http://lakekeeper:8181/management/v1/bootstrap
        -H 'Content-Type: application/json'
        -d '{"accept-terms-of-use": true}');
        [ "$$CODE" -ge 200 ] && [ "$$CODE" -lt 500 ] && exit 0;
        echo "bootstrap failed with HTTP $$CODE" && exit 1
    restart: "no"
    depends_on:
      lakekeeper:
        condition: service_healthy

  lakekeeper-warehouse:
    image: curlimages/curl
    entrypoint: /bin/sh
    command:
      - "-c"
      - >-
        CODE=$$(curl -s -o /dev/null -w '%{http_code}' -X POST
        http://lakekeeper:8181/management/v1/warehouse
        -H 'Content-Type: application/json'
        -d @/home/curl_user/create-warehouse.json);
        [ "$$CODE" -ge 200 ] && [ "$$CODE" -lt 500 ] && exit 0;
        echo "warehouse creation failed with HTTP $$CODE" && exit 1
    volumes:
      - ./create-warehouse.json:/home/curl_user/create-warehouse.json
    restart: "no"
    depends_on:
      lakekeeper-bootstrap:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully

  collector:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "55679:55679"
    depends_on:
      lakekeeper-warehouse:
        condition: service_completed_successfully

  telemetrygen-traces:
    image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:latest
    command:
      - traces
      - --otlp-endpoint=collector:4317
      - --otlp-insecure
      - --rate=10
      - --duration=inf
      - --service=demo-service
      - --span-duration=100ms
    depends_on:
      - collector

  telemetrygen-metrics:
    image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:latest
    command:
      - metrics
      - --otlp-endpoint=collector:4317
      - --otlp-insecure
      - --rate=20
      - --duration=inf
      - --service=demo-service
    depends_on:
      - collector

  telemetrygen-logs:
    image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:latest
    command:
      - logs
      - --otlp-endpoint=collector:4317
      - --otlp-insecure
      - --rate=20
      - --duration=inf
      - --service=demo-service
    depends_on:
      - collector

volumes:
  minio-data:
  lakekeeper-data:
